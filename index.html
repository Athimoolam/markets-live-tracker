<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Markets • Live Status</title>

  <!-- PWA manifest -->
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#0a0a1f">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

  <style>
    :root {
      --bg: #0a0a1f;
      --card: #1c1c3a;
      --text: #e2e8f0;
      --accent: #bb86fc;
      --green: #10b981;
      --red: #f87171;
      --link: #22d3ee;
      --sub: #5eead4;
      --muted: #94a3b8;
    }
    [data-theme="light"] {
      --bg: #f8fafc;
      --card: #ffffff;
      --text: #1e293b;
      --accent: #0ea5e9;
      --green: #059669;
      --red: #dc2626;
      --link: #0284c7;
      --sub: #0d9488;
      --muted: #64748b;
    }
    body {
      font-family: Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      margin: 0;
      padding: 12px 10px;
      min-height: 100vh;
      transition: background 0.3s, color 0.3s;
    }
    .container {
      max-width: 1600px;
      margin: 0 auto;
    }
    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
    }
    h1 {
      margin: 0;
      color: var(--accent);
      font-size: 1.8em;
    }
    .theme-toggle {
      background: none;
      border: 1px solid var(--muted);
      color: var(--text);
      padding: 8px 12px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.95em;
    }
    .clock {
      text-align: center;
      font-size: 1em;
      margin: 8px 0 16px;
      color: var(--muted);
    }
    .panel {
      background: var(--card);
      border-radius: 10px;
      overflow: hidden;
      box-shadow: 0 4px 16px rgba(0,0,0,0.3);
      margin-bottom: 24px;
    }
    .panel h2 {
      margin: 0;
      padding: 10px 14px;
      background: var(--bg);
      color: var(--accent);
      font-size: 1.15em;
      text-align: center;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.88em;
    }
    th, td {
      padding: 6px 8px;
      text-align: left;
      border-bottom: 1px solid #334155;
    }
    th {
      background: var(--bg);
      color: #cbd5e1;
    }
    .open    { background: var(--green) !important; color: white; font-weight: bold; }
    .closed  { background: var(--red)   !important; color: white; }
    .weekend { background: #475569 !important; color: #cbd5e1; }
    .always-open { background: #047857 !important; color: white; }
    .exchange-name a { color: var(--link); text-decoration: none; font-weight: bold; }
    .exchange-name a:hover { text-decoration: underline; }
    tr:hover { background: rgba(255,255,255,0.04); }
    .subheader {
      background: var(--bg) !important;
      color: var(--sub) !important;
      font-weight: bold;
      text-align: center;
      padding: 5px !important;
    }
    .indices {
      background: var(--card);
      border-radius: 10px;
      padding: 16px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.6);
      margin-top: 24px;
    }
    .index-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 12px;
      margin-top: 12px;
    }
    .index-card {
      background: var(--bg);
      padding: 12px;
      border-radius: 8px;
      text-align: center;
    }
    .index-name { font-weight: bold; margin-bottom: 4px; }
    .index-value { font-size: 1.3em; }
    .index-change.up   { color: var(--green); }
    .index-change.down { color: var(--red); }
  </style>
</head>
<body>

<div class="container">
  <header>
    <h1>Markets Live</h1>
    <button class="theme-toggle" id="themeToggle">Light Mode</button>
  </header>

  <div class="clock">
    Your Time: <span id="localTime"></span> | UTC: <span id="utcTime"></span>
  </div>

  <div class="panel">
    <h2>Markets Overview</h2>
    <table>
      <thead>
        <tr>
          <th>Exchange</th>
          <th>Local Hours</th>
          <th>Current Local</th>
          <th>Time Diff</th>
          <th>Open–Close (your time)</th>
          <th>Status</th>
          <th>Next</th>
        </tr>
      </thead>
      <tbody id="marketBody"></tbody>
    </table>
  </div>

  <div class="indices">
    <h2>Major Indices (delayed)</h2>
    <div class="index-grid" id="indicesGrid"></div>
  </div>
</div>

<script>
// ────────────────────────────────────────────────
// DATA – ordered earliest → latest open (UTC)
// ────────────────────────────────────────────────

const ALL_EXCHANGES = [
  { name: "TSE", city: "Tokyo", utcOpen: 0, utcClose: 6, note: "09:00–15:00 JST", timeZone: "Asia/Tokyo", url: "https://www.jpx.co.jp/english/" },
  { name: "SGX", city: "Singapore", utcOpen: 1, utcClose: 9, note: "09:00–17:00 SGT", timeZone: "Asia/Singapore", url: "https://www.sgx.com/" },
  { name: "SSE", city: "Shanghai", utcOpen: 1.5, utcClose: 7, note: "09:30–15:00 CST", timeZone: "Asia/Shanghai", url: "http://english.sse.com.cn/" },
  { name: "HKEX", city: "Hong Kong", utcOpen: 1.5, utcClose: 8, note: "09:30–16:00 HKT", timeZone: "Asia/Hong_Kong", url: "https://www.hkex.com.hk/" },
  { name: "ASX", city: "Sydney", utcOpen: 22, utcClose: 8, note: "10:00–16:00 AEDT/AEST", timeZone: "Australia/Sydney", url: "https://www.asx.com.au/" },
  { name: "NSE India", city: "Mumbai", utcOpen: 3.75, utcClose: 10, note: "09:15–15:30 IST", timeZone: "Asia/Kolkata", url: "https://www.nseindia.com/" },
  { name: "BSE India", city: "Mumbai", utcOpen: 3.75, utcClose: 10, note: "09:15–15:30 IST", timeZone: "Asia/Kolkata", url: "https://www.bseindia.com/" },
  { name: "DFM Dubai", city: "Dubai", utcOpen: 6, utcClose: 12, note: "10:00–16:00 GST", timeZone: "Asia/Dubai", url: "https://www.dfm.ae/" },
  { name: "Nasdaq Stockholm", city: "Stockholm", utcOpen: 8, utcClose: 16.5, note: "09:00–17:30 CET", timeZone: "Europe/Stockholm", nordic: true, url: "https://www.nasdaqomxnordic.com/" },
  { name: "Nasdaq Copenhagen", city: "Copenhagen", utcOpen: 8, utcClose: 16, note: "09:00–17:00 CET", timeZone: "Europe/Copenhagen", nordic: true, url: "https://www.nasdaqomxnordic.com/" },
  { name: "Nasdaq Helsinki", city: "Helsinki", utcOpen: 8, utcClose: 16.5, note: "10:00–18:30 EET", timeZone: "Europe/Helsinki", nordic: true, url: "https://www.nasdaqomxnordic.com/" },
  { name: "Oslo Børs", city: "Oslo", utcOpen: 8, utcClose: 15.5, note: "09:00–16:30 CET", timeZone: "Europe/Oslo", nordic: true, url: "https://www.euronext.com/en/markets/oslo" },
  { name: "Nasdaq Iceland", city: "Reykjavik", utcOpen: 9.5, utcClose: 15.4167, note: "09:30–15:25 GMT", timeZone: "Atlantic/Reykjavik", nordic: true, url: "https://www.nasdaqomxnordic.com/" },
  { name: "LSE", city: "London", utcOpen: 8, utcClose: 16.5, note: "08:00–16:30 GMT/BST", timeZone: "Europe/London", url: "https://www.londonstockexchange.com/" },
  { name: "Euronext Paris", city: "Paris", utcOpen: 8, utcClose: 16.5, note: "09:00–17:30 CET", timeZone: "Europe/Paris", url: "https://www.euronext.com/en/markets/paris" },
  { name: "Frankfurt (DAX)", city: "Frankfurt", utcOpen: 7, utcClose: 19, note: "08:00–20:00 CET", timeZone: "Europe/Berlin", url: "https://www.boerse-frankfurt.de/" },
  { name: "NYSE / NASDAQ", city: "New York", utcOpen: 14.5, utcClose: 21, note: "09:30–16:00 ET", timeZone: "America/New_York", url: "https://www.nyse.com/" },
  { name: "Binance", city: "Global", utcOpen: null, utcClose: null, note: "24/7", timeZone: null, isCrypto: true, url: "https://www.binance.com/en/trade" },
  { name: "Coinbase", city: "Global", utcOpen: null, utcClose: null, note: "24/7", timeZone: null, isCrypto: true, url: "https://www.coinbase.com/trade" },
  { name: "Kraken", city: "Global", utcOpen: null, utcClose: null, note: "24/7", timeZone: null, isCrypto: true, url: "https://www.kraken.com/" },
  { name: "Bitstamp", city: "Europe/Global", utcOpen: null, utcClose: null, note: "24/7", timeZone: null, isCrypto: true, url: "https://www.bitstamp.net/" },
  { name: "Bybit / OKX", city: "Global", utcOpen: null, utcClose: null, note: "24/7", timeZone: null, isCrypto: true, url: "https://www.bybit.com/" }
];

// ────────────────────────────────────────────────
// HELPERS
// ────────────────────────────────────────────────

function pad(n) { return n.toString().padStart(2, '0'); }

function formatHour(h, offset = 0) {
  if (h == null) return '—';
  let adj = h + offset;
  adj = (adj + 24) % 24;
  const hh = Math.floor(adj);
  const mm = Math.round((adj % 1) * 60);
  return `${pad(hh)}:${pad(mm)}`;
}

function getLocalTime(tz) {
  if (!tz) return 'Global / 24/7';
  const now = new Date();
  return now.toLocaleTimeString([], { timeZone: tz, hour12: false, hour: '2-digit', minute: '2-digit' }) +
         ' ' + tz.split('/').pop().replace(/_/g, ' ');
}

function getTimeDiff(tz) {
  if (!tz) return '—';
  const now = new Date();
  const local = new Date(now.toLocaleString('en-US', { timeZone: Intl.DateTimeFormat().resolvedOptions().timeZone }));
  const market = new Date(now.toLocaleString('en-US', { timeZone: tz }));
  const diffH = Math.round((market - local) / 3600000);
  if (diffH === 0) return '0h';
  return diffH > 0 ? `+${diffH}h` : `${diffH}h`;
}

function getStatus(utcH, day, open, close, isCrypto) {
  if (isCrypto) return { text: '24/7 OPEN', cls: 'always-open', countdown: 'Always active' };
  if (day === 0 || day === 6) return { text: 'Weekend', cls: 'weekend', countdown: 'Next: Monday' };

  const overnight = close < open;
  const isOpen = overnight ? (utcH >= open || utcH < close) : (utcH >= open && utcH < close);

  let diff = isOpen ? close - utcH : open - utcH;
  if (diff < 0) diff += 24;
  const h = Math.floor(diff);
  const m = Math.round((diff % 1) * 60);
  return {
    text: isOpen ? 'OPEN' : 'CLOSED',
    cls: isOpen ? 'open' : 'closed',
    countdown: `${isOpen ? 'Closes' : 'Opens'} in ${h}h ${m}m`
  };
}

function getUserOffset() {
  return -(new Date().getTimezoneOffset() / 60);
}

// ────────────────────────────────────────────────
// RENDER
// ────────────────────────────────────────────────

function renderClock() {
  const n = new Date();
  document.getElementById('localTime').textContent = n.toLocaleTimeString([], {hour12:false}) + ' (' + Intl.DateTimeFormat().resolvedOptions().timeZone + ')';
  document.getElementById('utcTime').textContent = n.toUTCString().slice(17,25) + ' UTC';
}

function renderMarkets() {
  const n = new Date();
  const utcH = n.getUTCHours() + n.getUTCMinutes()/60 + n.getUTCSeconds()/3600;
  const day = n.getUTCDay();
  const offset = getUserOffset();
  let html = '';
  let nordic = false;

  ALL_EXCHANGES.forEach(ex => {
    if (ex.nordic && !nordic) {
      html += `<tr class="subheader"><td colspan="7">Nordic Markets</td></tr>`;
      nordic = true;
    }
    if (ex.isCrypto && !html.includes('Crypto')) {
      html += `<tr class="subheader"><td colspan="7">Crypto Exchanges (24/7)</td></tr>`;
    }

    const status = getStatus(utcH, day, ex.utcOpen, ex.utcClose, ex.isCrypto);

    const nameCell = ex.url
      ? `<td class="exchange-name"><a href="${ex.url}" target="_blank">${ex.name}</a></td>`
      : `<td>${ex.name}</td>`;

    const localOpen = formatHour(ex.utcOpen, offset);
    const localClose = formatHour(ex.utcClose, offset);

    const diff = getTimeDiff(ex.timeZone);

    html += `
      <tr class="${status.cls}">
        ${nameCell}
        <td>${ex.note || '—'}</td>
        <td>${getLocalTime(ex.timeZone)}</td>
        <td>${diff}</td>
        <td>${localOpen} – ${localClose}</td>
        <td><strong>${status.text}</strong></td>
        <td>${status.countdown}</td>
      </tr>`;
  });

  document.getElementById('marketBody').innerHTML = html;
}

// ────────────────────────────────────────────────
// Theme toggle + persistence
// ────────────────────────────────────────────────

function initTheme() {
  const saved = localStorage.getItem('theme') || 'dark';
  document.documentElement.setAttribute('data-theme', saved);
  document.getElementById('themeToggle').textContent = saved === 'dark' ? 'Light Mode' : 'Dark Mode';
}

document.getElementById('themeToggle').addEventListener('click', () => {
  const current = document.documentElement.getAttribute('data-theme');
  const next = current === 'dark' ? 'light' : 'dark';
  document.documentElement.setAttribute('data-theme', next);
  localStorage.setItem('theme', next);
  document.getElementById('themeToggle').textContent = next === 'dark' ? 'Light Mode' : 'Dark Mode';
});

// ────────────────────────────────────────────────
// PWA – register service worker (very basic)
// ────────────────────────────────────────────────

if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('/sw.js').catch(err => console.log('SW registration failed:', err));
  });
}

// ────────────────────────────────────────────────
// START
// ────────────────────────────────────────────────

initTheme();
renderClock();
renderMarkets();
setInterval(() => {
  renderClock();
  renderMarkets();
}, 60000);
</script>

</body>
</html>
