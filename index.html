<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>World Markets Live</title>
  <style>
    :root { 
      --bg: #0a0a1f; --card: #1c1c3a; --text: #ddd; --accent: #bb86fc; 
      --green: #4ade80; --red: #f87171; --link: #66d9ff; 
      --sub-gradient: linear-gradient(90deg, #162447 0%, #1f4068 100%);
      --header-bg: #0d1b40;
      --mkt-time: #ffcc00; 
    }

    /* PLEASANT LIGHT MODE REFINEMENT */
    [data-theme="light"] {
      --bg: #f1f5f9;       /* Soft Slate */
      --card: #ffffff;     /* Clean White */
      --text: #0f172a;     /* Deep Navy Text */
      --accent: #7c3aed;   /* Muted Violet */
      --green: #16a34a;    /* Forest Green */
      --red: #dc2626;      /* Deep Red */
      --link: #2563eb;     /* Professional Blue */
      --sub-gradient: linear-gradient(90deg, #e2e8f0 0%, #cbd5e1 100%);
      --header-bg: #1e293b; /* Dark Slate Header */
      --mkt-time: #4338ca; /* Rich Indigo */
    }
    
    body { font-family: 'Segoe UI', Arial, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 0 10px 10px 10px; transition: all 0.3s ease; }
    .container { max-width: 1300px; margin: 0 auto; position: relative; }
    
    .theme-toggle {
      position: absolute; top: 10px; right: 0;
      padding: 4px 12px; cursor: pointer; border-radius: 4px;
      border: 1px solid var(--accent); background: var(--card); color: var(--text);
      font-size: 0.8em; font-weight: bold; z-index: 100;
    }

    h1.app-title {
      text-align: center; color: #fff; font-size: 1.7em;
      margin: 10px 0 2px 0; letter-spacing: 1px;
      text-shadow: 0 0 10px rgba(187, 134, 252, 0.4);
    }
    
    [data-theme="light"] h1.app-title { color: #1e293b; text-shadow: none; }

    .clock { text-align: center; font-size: 0.95em; margin-bottom: 12px; color: #66ff99; font-family: monospace; opacity: 0.9; }
    [data-theme="light"] .clock { color: #16a34a; font-weight: bold; }

    .panel { background: var(--card); border-radius: 8px; overflow-x: auto; box-shadow: 0 8px 25px rgba(0,0,0,0.3); border: 1px solid rgba(0,0,0,0.05); }
    table { width: 100%; border-collapse: collapse; min-width: 1050px; }
    
    th, td { padding: 7px 12px; text-align: left; border-bottom: 1px solid #2d2d4d; white-space: nowrap; font-size: 1.0em; }
    [data-theme="light"] td { border-bottom: 1px solid #e2e8f0; }

    th { background: var(--header-bg); color: #ffcc00; font-size: 0.75em; text-transform: uppercase; letter-spacing: 0.5px; position: sticky; top: 0; z-index: 10; }
    [data-theme="light"] th { color: #f1f5f9; }
    
    .subheader { 
      background: var(--sub-gradient) !important; 
      color: #ffffff !important; 
      font-size: 1.0em; text-align: center; font-weight: 700; letter-spacing: 1.5px; height: 34px;
    }
    [data-theme="light"] .subheader { color: #1e293b !important; }

    /* INCREASED TEXT SIZE & RICH INDIGO/GOLD COLOR */
    .market-time-cell { 
      font-family: monospace; 
      font-weight: 800; 
      font-size: 1.2em !important; 
      color: var(--mkt-time); 
    }

    .status-open { color: var(--green); font-weight: bold; }
    .status-closed { color: var(--red); font-weight: bold; }
    .status-weekend { color: #64748b; font-style: italic; }
    
    .exchange-name a { color: var(--link); text-decoration: none; font-weight: bold; }
    .city-label { color: #64748b; font-size: 0.8em; margin-left: 8px; font-weight: normal; }
    
    tr:hover { background: rgba(255,255,255,0.05); }
    [data-theme="light"] tr:hover { background: rgba(0,0,0,0.02); }

    .cd-val { font-family: 'Courier New', monospace; font-weight: bold; }
    [data-theme="light"] .cd-val { color: #1e293b; }
  </style>
</head>
<body>

<div class="container">
  <button class="theme-toggle" onclick="toggleTheme()" id="themeBtn">🌓 Appearance</button>
  <h1 class="app-title">World Markets Live</h1>
  <div class="clock">YOUR TIME: <span id="localTime"></span> | UTC: <span id="utcTime"></span></div>
  
  <div class="panel">
    <table>
      <thead>
        <tr>
          <th>Exchange</th>
          <th>Opening Hours (Local)</th>
          <th>Session</th>
          <th>Local Time</th>
          <th>Your Diff</th>
          <th>Status</th>
          <th>To Open</th>
          <th>To Close</th>
        </tr>
      </thead>
      <tbody id="marketBody"></tbody>
    </table>
  </div>
</div>

<script>
function toggleTheme() {
  const current = document.documentElement.getAttribute('data-theme');
  const target = current === 'light' ? 'dark' : 'light';
  document.documentElement.setAttribute('data-theme', target);
  localStorage.setItem('user_market_theme_pro', target);
}
const savedTheme = localStorage.getItem('user_market_theme_pro') || 'dark';
document.documentElement.setAttribute('data-theme', savedTheme);

const EXCHANGES = [
  { name: "ASX", city: "Sydney", open: "10:00", close: "16:00", tz: "Australia/Sydney", url: "https://www.asx.com.au/", group: "ASIA-PACIFIC" },
  { name: "TSE", city: "Tokyo", open: "09:00", close: "15:00", tz: "Asia/Tokyo", url: "https://www.jpx.co.jp/english/", group: "ASIA-PACIFIC" },
  { name: "SGX", city: "Singapore", open: "09:00", close: "17:00", tz: "Asia/Singapore", url: "https://www.sgx.com/", group: "ASIA-PACIFIC" },
  { name: "SSE", city: "Shanghai", open: "09:30", close: "15:00", tz: "Asia/Shanghai", url: "http://english.sse.com.cn/", group: "ASIA-PACIFIC" },
  { name: "HKEX", city: "Hong Kong", open: "09:30", close: "16:00", tz: "Asia/Hong_Kong", url: "https://www.hkex.com.hk/", group: "ASIA-PACIFIC" },
  { name: "NSE", city: "Delhi", open: "09:15", close: "15:30", tz: "Asia/Kolkata", url: "https://www.nseindia.com/", group: "ASIA-PACIFIC" },
  { name: "BSE", city: "Mumbai", open: "09:15", close: "15:30", tz: "Asia/Kolkata", url: "https://www.bseindia.com/", group: "ASIA-PACIFIC" },
  { name: "DFM", city: "Dubai", open: "10:00", close: "16:00", tz: "Asia/Dubai", url: "https://www.dfm.ae/", group: "ASIA-PACIFIC" },
  
  { name: "Nasdaq HEL", city: "Helsinki", open: "10:00", close: "18:30", tz: "Europe/Helsinki", url: "https://www.nasdaqomxnordic.com/", group: "EMEA & NORDICS" },
  { name: "DAX", city: "Frankfurt", open: "08:00", close: "20:00", tz: "Europe/Berlin", url: "https://www.boerse-frankfurt.de/", group: "EMEA & NORDICS" },
  { name: "Euronext PAR", city: "Paris", open: "09:00", close: "17:30", tz: "Europe/Paris", url: "https://www.euronext.com/", group: "EMEA & NORDICS" },
  { name: "Nasdaq STO", city: "Stockholm", open: "09:00", close: "17:30", tz: "Europe/Stockholm", url: "https://www.nasdaqomxnordic.com/", group: "EMEA & NORDICS" },
  { name: "Nasdaq CPH", city: "Copenhagen", open: "09:00", close: "17:00", tz: "Europe/Copenhagen", url: "https://www.nasdaqomxnordic.com/", group: "EMEA & NORDICS" },
  { name: "Oslo Børs", city: "Oslo", open: "09:00", close: "16:30", tz: "Europe/Oslo", url: "https://www.euronext.com/en/markets/oslo", group: "EMEA & NORDICS" },
  { name: "LSE", city: "London", open: "08:00", close: "16:30", tz: "Europe/London", url: "https://www.londonstockexchange.com/", group: "EMEA & NORDICS" },
  { name: "Nasdaq ICE", city: "Iceland", open: "09:30", close: "15:30", tz: "Atlantic/Reykjavik", url: "https://www.nasdaqomxnordic.com/", group: "EMEA & NORDICS" },
  
  { name: "NYSE/NASDAQ", city: "New York", open: "09:30", close: "16:00", tz: "America/New_York", url: "https://www.nyse.com/", group: "AMERICAS & CRYPTO" },
  { name: "Binance", city: "Global", isCrypto: true, url: "https://www.binance.com/", group: "AMERICAS & CRYPTO" },
  { name: "Coinbase", city: "Global", isCrypto: true, url: "https://www.coinbase.com/", group: "AMERICAS & CRYPTO" },
  { name: "Kraken", city: "Global", isCrypto: true, url: "https://www.kraken.com/", group: "AMERICAS & CRYPTO" },
  { name: "Bybit", city: "Global", isCrypto: true, url: "https://www.bybit.com/", group: "AMERICAS & CRYPTO" }
];

function calculateDuration(open, close) {
  if (!open) return "24h";
  const [oH, oM] = open.split(':').map(Number);
  const [cH, cM] = close.split(':').map(Number);
  let diffMin = (cH * 60 + cM) - (oH * 60 + oM);
  if (diffMin < 0) diffMin += 1440;
  return `${Math.floor(diffMin / 60)}h ${diffMin % 60}m`;
}

function update() {
  const now = new Date();
  document.getElementById('localTime').textContent = now.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit', second:'2-digit', hour12: false});
  document.getElementById('utcTime').textContent = now.toISOString().slice(11, 19);

  let html = '';
  let lastGroup = '';

  EXCHANGES.forEach(ex => {
    if (ex.group !== lastGroup) {
      html += `<tr class="subheader"><td colspan="8">${ex.group}</td></tr>`;
      lastGroup = ex.group;
    }

    let statusText = '', statusCls = '', toOpen = '—', toClose = '—', marketTimeStr = 'Global', diffStr = '0h';
    const duration = calculateDuration(ex.open, ex.close);

    if (ex.isCrypto) {
      statusText = 'OPEN'; statusCls = 'status-open'; toClose = 'Non-stop';
    } else {
      const options = { timeZone: ex.tz, weekday: 'short', month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit', hour12: false };
      marketTimeStr = now.toLocaleString("en-US", options);
      
      const mDateString = now.toLocaleString("en-US", {timeZone: ex.tz});
      const mDate = new Date(mDateString);
      const day = mDate.getDay();
      const currentMin = mDate.getHours() * 60 + mDate.getMinutes();
      const [oH, oM] = ex.open.split(':').map(Number);
      const [cH, cM] = ex.close.split(':').map(Number);
      const openMin = oH * 60 + oM;
      const closeMin = cH * 60 + cM;

      const localTz = Intl.DateTimeFormat().resolvedOptions().timeZone;
      const localOffset = new Date(now.toLocaleString("en-US", {timeZone: localTz})).getTime();
      const marketOffset = new Date(mDateString).getTime();
      const diffDecimal = (marketOffset - localOffset) / 3600000;
      diffStr = (diffDecimal >= 0 ? '+' : '') + diffDecimal.toFixed(1) + 'h';

      if (day === 0 || day === 6) {
        statusText = 'WEEKEND'; statusCls = 'status-weekend'; toOpen = 'Mon';
      } else if (currentMin >= openMin && currentMin < closeMin) {
        statusText = 'OPEN'; statusCls = 'status-open';
        let rem = closeMin - currentMin;
        toClose = `<span class="cd-val">${Math.floor(rem/60)}h ${rem%60}m</span>`;
      } else {
        statusText = 'CLOSED'; statusCls = 'status-closed';
        let rem = openMin - currentMin;
        if (rem < 0) rem += 1440;
        toOpen = `<span class="cd-val">${Math.floor(rem/60)}h ${rem%60}m</span>`;
      }
    }

    html += `<tr>
        <td class="exchange-name"><a href="${ex.url}" target="_blank">${ex.name}</a><span class="city-label">${ex.city}</span></td>
        <td style="font-size: 0.95em; opacity: 0.9;">${ex.open ? ex.open + ' – ' + ex.close : '24/7'}</td>
        <td style="color: var(--link); opacity: 0.8;">${duration}</td>
        <td class="market-time-cell">${marketTimeStr}</td>
        <td style="font-weight: 500;">${diffStr}</td>
        <td class="${statusCls}">${statusText}</td>
        <td style="color: #b45309; font-weight: 600;">${toOpen}</td>
        <td style="color: var(--green); font-weight: 600;">${toClose}</td>
      </tr>`;
  });
  document.getElementById('marketBody').innerHTML = html;
}

setInterval(update, 1000);
update();
</script>
</body>
</html>
