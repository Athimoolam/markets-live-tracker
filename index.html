<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Markets • Live Status</title>
  <style>
    :root {
      --bg: #0a0a1f;
      --card: #1c1c3a;
      --text: #ddd;
      --accent: #bb86fc;
      --green: #2e7d32;
      --red:   #c62828;
      --link:  #66d9ff;
    }
    body {
      font-family: Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      margin: 0;
      padding: 12px 10px;
      min-height: 100vh;
    }
    .container {
      max-width: 1400px;
      margin: 0 auto;
    }
    h1 {
      text-align: center;
      color: var(--accent);
      margin: 10px 0 8px;
      font-size: 1.8em;
    }
    .clock {
      text-align: center;
      font-size: 1.05em;
      margin-bottom: 12px;
      color: #66ff99;
    }
    .panel {
      background: var(--card);
      border-radius: 10px;
      overflow: hidden;
      box-shadow: 0 4px 16px rgba(0,0,0,0.6);
    }
    .panel h2 {
      margin: 0;
      padding: 8px 12px;
      background: #0d1b40;
      color: #ffcc00;
      font-size: 1.15em;
      text-align: center;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.9em;
    }
    th, td {
      padding: 6px 8px;
      text-align: left;
      border-bottom: 1px solid #333;
    }
    th {
      background: #0d1b40;
      color: #ffcc00;
    }
    .open    { background: var(--green) !important; font-weight: bold; color: white; }
    .closed  { background: var(--red)   !important; color: white; }
    .weekend { background: #424242 !important; }
    .always-open { background: #1b5e20 !important; color: white; }
    .countdown { font-size: 0.86em; color: #a0d0ff; white-space: nowrap; }
    .local-time-cell {
      white-space: nowrap;
      min-width: 130px;
    }
    .duration-cell {
      min-width: 70px;
      white-space: nowrap;
      text-align: left;
    }
    .status-cell {
      min-width: 100px;
      white-space: nowrap;
    }
    .diff-cell {
      min-width: 80px;
      white-space: nowrap;
    }
    .open-close-cell {
      min-width: 120px;
      white-space: nowrap;
    }
    .exchange-name a {
      color: var(--link);
      text-decoration: none;
      font-weight: bold;
    }
    .exchange-name a:hover {
      text-decoration: underline;
      color: #99e6ff;
    }
    tr:hover { background: rgba(255,255,255,0.06); }
    .subheader {
      background: #0d1b40 !important;
      color: #80ffaa !important;
      font-weight: bold;
      text-align: center;
      padding: 5px !important;
    }
  </style>
</head>
<body>

<div class="container">
  <h1>World Markets Live</h1>
  <div class="clock">
    Your Time: <span id="localTime"></span> | UTC: <span id="utcTime"></span>
  </div>

  <div class="panel">
    <h2>Markets Overview</h2>
    <table>
      <thead>
        <tr>
          <th>Exchange</th>
          <th>Local Hours</th>
          <th>Duration</th>
          <th>Current Local</th>
          <th>Time Diff</th>
          <th>Open–Close (your time)</th>
          <th>Status</th>
          <th>Next</th>
        </tr>
      </thead>
      <tbody id="marketBody"></tbody>
    </table>
  </div>
</div>

<script>
// DATA – ordered earliest → latest open (UTC)
const ALL_EXCHANGES = [
  { name: "TSE", city: "Tokyo", utcOpen: 0, utcClose: 6, note: "09:00–15:00 JST", timeZone: "Asia/Tokyo", url: "https://www.jpx.co.jp/english/" },
  { name: "SGX", city: "Singapore", utcOpen: 1, utcClose: 9, note: "09:00–17:00 SGT", timeZone: "Asia/Singapore", url: "https://www.sgx.com/" },
  { name: "SSE", city: "Shanghai", utcOpen: 1.5, utcClose: 7, note: "09:30–15:00 CST", timeZone: "Asia/Shanghai", url: "http://english.sse.com.cn/" },
  { name: "HKEX", city: "Hong Kong", utcOpen: 1.5, utcClose: 8, note: "09:30–16:00 HKT", timeZone: "Asia/Hong_Kong", url: "https://www.hkex.com.hk/" },
  { name: "ASX", city: "Sydney", utcOpen: 22, utcClose: 8, note: "10:00–16:00 AEDT/AEST", timeZone: "Australia/Sydney", url: "https://www.asx.com.au/" },
  { name: "NSE India", city: "Mumbai", utcOpen: 3.75, utcClose: 10, note: "09:15–15:30 IST", timeZone: "Asia/Kolkata", url: "https://www.nseindia.com/" },
  { name: "BSE India", city: "Mumbai", utcOpen: 3.75, utcClose: 10, note: "09:15–15:30 IST", timeZone: "Asia/Kolkata", url: "https://www.bseindia.com/" },
  { name: "DFM Dubai", city: "Dubai", utcOpen: 6, utcClose: 12, note: "10:00–16:00 GST", timeZone: "Asia/Dubai", url: "https://www.dfm.ae/" },
  { name: "Nasdaq Stockholm", city: "Stockholm", utcOpen: 8, utcClose: 16.5, note: "09:00–17:30 CET", timeZone: "Europe/Stockholm", nordic: true, url: "https://www.nasdaqomxnordic.com/" },
  { name: "Nasdaq Copenhagen", city: "Copenhagen", utcOpen: 8, utcClose: 16, note: "09:00–17:00 CET", timeZone: "Europe/Copenhagen", nordic: true, url: "https://www.nasdaqomxnordic.com/" },
  { name: "Nasdaq Helsinki", city: "Helsinki", utcOpen: 8, utcClose: 16.5, note: "10:00–18:30 EET", timeZone: "Europe/Helsinki", nordic: true, url: "https://www.nasdaqomxnordic.com/" },
  { name: "Oslo Børs", city: "Oslo", utcOpen: 8, utcClose: 15.5, note: "09:00–16:30 CET approx.", timeZone: "Europe/Oslo", nordic: true, url: "https://www.euronext.com/en/markets/oslo" },
  { name: "Nasdaq Iceland", city: "Reykjavik", utcOpen: 9.5, utcClose: 15.4167, note: "09:30–15:25 GMT", timeZone: "Atlantic/Reykjavik", nordic: true, url: "https://www.nasdaqomxnordic.com/" },
  { name: "LSE", city: "London", utcOpen: 8, utcClose: 16.5, note: "08:00–16:30 GMT/BST", timeZone: "Europe/London", url: "https://www.londonstockexchange.com/" },
  { name: "Euronext Paris", city: "Paris", utcOpen: 8, utcClose: 16.5, note: "09:00–17:30 CET", timeZone: "Europe/Paris", url: "https://www.euronext.com/en/markets/paris" },
  { name: "Frankfurt (DAX)", city: "Frankfurt", utcOpen: 7, utcClose: 19, note: "08:00–20:00 CET", timeZone: "Europe/Berlin", url: "https://www.boerse-frankfurt.de/" },
  { name: "NYSE / NASDAQ", city: "New York", utcOpen: 14.5, utcClose: 21, note: "09:30–16:00 ET", timeZone: "America/New_York", url: "https://www.nyse.com/" },
  { name: "Binance", city: "Global", utcOpen: null, utcClose: null, note: "24/7", timeZone: null, isCrypto: true, url: "https://www.binance.com/en/trade" },
  { name: "Coinbase", city: "Global", utcOpen: null, utcClose: null, note: "24/7", timeZone: null, isCrypto: true, url: "https://www.coinbase.com/trade" },
  { name: "Kraken", city: "Global", utcOpen: null, utcClose: null, note: "24/7", timeZone: null, isCrypto: true, url: "https://www.kraken.com/" },
  { name: "Bitstamp", city: "Europe/Global", utcOpen: null, utcClose: null, note: "24/7", timeZone: null, isCrypto: true, url: "https://www.bitstamp.net/" },
  { name: "Bybit / OKX", city: "Global", utcOpen: null, utcClose: null, note: "24/7", timeZone: null, isCrypto: true, url: "https://www.bybit.com/" }
];

// Helpers
function pad(n) { return n.toString().padStart(2, '0'); }

function formatHour(h, offsetHours = 0) {
  if (h === null) return '—';
  let adjusted = h + offsetHours;
  if (adjusted < 0) adjusted += 24;
  if (adjusted >= 24) adjusted -= 24;
  const hh = Math.floor(adjusted);
  const mm = Math.round((adjusted % 1) * 60);
  return `${pad(hh)}:${pad(mm)}`;
}

function getLocalTime(tz) {
  if (!tz) return 'Global / 24/7';
  const now = new Date();
  return now.toLocaleTimeString([], {
    timeZone: tz,
    hour12: false,
    hour: '2-digit',
    minute: '2-digit'
  }) + ' ' + tz.split('/').pop().replace(/_/g, ' ');
}

function getTimeDiffString(tz) {
  if (!tz) return '—';
  const now = new Date();
  const localDate = new Date(now.toLocaleString('en-US', { timeZone: Intl.DateTimeFormat().resolvedOptions().timeZone }));
  const marketDate = new Date(now.toLocaleString('en-US', { timeZone: tz }));
  const diffMs = marketDate - localDate;
  const diffHours = Math.round(diffMs / (1000 * 60 * 60));
  if (diffHours === 0) return '0h (same)';
  return diffHours > 0 ? `+${diffHours}h` : `${diffHours}h`;
}

function isWeekend(d) { return d === 0 || d === 6; }

function getStatusInfo(utcH, day, open, close, isCrypto = false) {
  if (isCrypto) return { status: "24/7 OPEN", cls: "always-open", countdown: "Always active" };

  if (isWeekend(day)) return { status: "Weekend", cls: "weekend", countdown: "Next: Monday" };

  const overnight = close < open;
  const isOpen = overnight ? (utcH >= open || utcH < close) : (utcH >= open && utcH < close);

  let diff = isOpen ? close - utcH : open - utcH;
  if (diff < 0) diff += 24;
  const h = Math.floor(diff);
  const m = Math.round((diff - h) * 60);
  const when = isOpen ? "Closes" : "Opens";

  return {
    status: isOpen ? "OPEN" : "CLOSED",
    cls: isOpen ? "open" : "closed",
    countdown: `${when} in ${h}h ${m}m`
  };
}

function getUserOffsetHours() {
  return - (new Date().getTimezoneOffset() / 60);
}

function calculateDuration(open, close) {
  if (open === null || close === null) return '24h';
  let diff = close - open;
  if (diff < 0) diff += 24;
  const h = Math.floor(diff);
  const m = Math.round((diff - h) * 60);
  return m === 0 ? `${h}h` : `${h}h ${m}m`;
}

// Render clock
function renderClock() {
  const n = new Date();
  document.getElementById("localTime").textContent = n.toLocaleTimeString([], {hour12:false}) + " (" + Intl.DateTimeFormat().resolvedOptions().timeZone + ")";
  document.getElementById("utcTime").textContent = n.toUTCString().slice(17,25) + " UTC";
}

// Render markets table
function renderMarkets() {
  const n = new Date();
  const utcH = n.getUTCHours() + n.getUTCMinutes()/60 + n.getUTCSeconds()/3600;
  const day = n.getUTCDay();
  const userOffset = getUserOffsetHours();
  let html = "";
  let nordic = false;

  ALL_EXCHANGES.forEach(ex => {
    if (ex.nordic && !nordic) {
      html += `<tr class="subheader"><td colspan="7">Nordic Markets</td></tr>`;
      nordic = true;
    }

    if (ex.isCrypto && !html.includes('Crypto Exchanges')) {
      html += `<tr class="subheader"><td colspan="7">Crypto Exchanges (24/7)</td></tr>`;
    }

    const info = getStatusInfo(utcH, day, ex.utcOpen, ex.utcClose, ex.isCrypto);

    const nameCell = ex.url 
      ? `<td class="exchange-name"><a href="${ex.url}" target="_blank" rel="noopener noreferrer">${ex.name}</a></td>`
      : `<td>${ex.name}</td>`;

    const localOpen = formatHour(ex.utcOpen, userOffset);
    const localClose = formatHour(ex.utcClose, userOffset);

    const diffStr = getTimeDiffString(ex.timeZone);
    const diffClass = diffStr.startsWith('+') ? 'positive' : diffStr.startsWith('-') ? 'negative' : 'zero';

    const duration = calculateDuration(ex.utcOpen, ex.utcClose);

    html += `
      <tr class="${info.cls}">
        ${nameCell}
        <td class="small-note">${ex.note || '—'}</td>
        <td class="duration-cell">${duration}</td>
        <td class="local-time-cell">${getLocalTime(ex.timeZone)}</td>
        <td class="diff-cell ${diffClass}">${diffStr}</td>
        <td class="open-close-cell">${localOpen} – ${localClose}</td>
        <td class="status-cell"><strong>${info.status}</strong></td>
        <td class="countdown">${info.countdown}</td>
      </tr>`;
  });

  document.getElementById("marketBody").innerHTML = html;
}

function update() {
  renderClock();
  renderMarkets();
}

update();
setInterval(update, 60000);
</script>

</body>
</html>
