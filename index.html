<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Markets • Live Status</title>
  <style>
    :root {
      --bg: #0f172a;              /* Deep navy-gray – calm base */
      --card: #1e293b;            /* Soft dark slate – panels */
      --text: #e2e8f0;            /* Light warm gray – main text */
      --accent: #67e8f9;          /* Soft cyan-blue – headers/links */
      --green: #10b981;           /* Emerald – open/success */
      --red:   #f87171;           /* Warm red – closed */
      --link:  #22d3ee;           /* Bright cyan – clickable links */
      --sub:   #5eead4;           /* Muted teal – subheaders */
    }
    body {
      font-family: Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      margin: 0;
      padding: 12px 8px;
      min-height: 100vh;
    }
    .container {
      max-width: 1600px;
      margin: 0 auto;
    }
    h1 {
      text-align: center;
      color: var(--accent);
      margin: 8px 0 6px;
      font-size: 1.8em;
    }
    .clock {
      text-align: center;
      font-size: 1.05em;
      margin-bottom: 10px;
      color: #a5f3fc;             /* Lighter cyan for clock */
    }
    .split {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      justify-content: center;
    }
    .panel {
      flex: 1 1 650px;
      min-width: 520px;
      background: var(--card);
      border-radius: 10px;
      overflow: hidden;
      box-shadow: 0 4px 16px rgba(0,0,0,0.6);
    }
    .panel h2 {
      margin: 0;
      padding: 8px 12px;
      background: #0f172a;
      color: var(--accent);
      font-size: 1.15em;
      text-align: center;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.91em;
    }
    th, td {
      padding: 7px 9px;
      text-align: left;
      border-bottom: 1px solid #334155;
    }
    th {
      background: #0f172a;
      color: #cbd5e1;
    }
    .open    { background: var(--green) !important; font-weight: bold; color: white; }
    .closed  { background: var(--red)   !important; color: white; }
    .weekend { background: #475569 !important; color: #cbd5e1; }
    .always-open { background: #047857 !important; color: white; }
    .countdown { font-size: 0.86em; color: #a5f3fc; white-space: nowrap; }
    .local-time-cell {
      white-space: nowrap;
      font-size: 0.88em;
      min-width: 140px;
      color: #94a3b8;
    }
    .status-cell {
      min-width: 110px;
      white-space: nowrap;
      text-align: center;
      font-weight: bold;
    }
    .exchange-name a {
      color: var(--link);
      text-decoration: none;
      font-weight: bold;
    }
    .exchange-name a:hover {
      text-decoration: underline;
      color: #67e8f9;
    }
    tr:hover { background: rgba(255,255,255,0.05); }
    .subheader {
      background: #0f172a !important;
      color: var(--sub) !important;
      font-weight: bold;
      text-align: center;
      padding: 6px !important;
    }
  </style>
</head>
<body>

<div class="container">
  <h1>World Markets Live</h1>
  <div class="clock">
    Your Time: <span id="localTime"></span> | UTC: <span id="utcTime"></span>
  </div>

  <div class="split">
    <!-- Left panel -->
    <div class="panel">
      <h2>Markets Overview</h2>
      <table>
        <thead>
          <tr>
            <th>Exchange</th>
            <th>Open–Close (UTC)</th>
            <th>Local Hours</th>
            <th>Current Local</th>
            <th>Status</th>
            <th>Next</th>
          </tr>
        </thead>
        <tbody id="leftBody"></tbody>
      </table>
    </div>

    <!-- Right panel (duplicate) -->
    <div class="panel">
      <h2>Markets Overview (Duplicate)</h2>
      <table>
        <thead>
          <tr>
            <th>Exchange</th>
            <th>Open–Close (UTC)</th>
            <th>Local Hours</th>
            <th>Current Local</th>
            <th>Status</th>
            <th>Next</th>
          </tr>
        </thead>
        <tbody id="rightBody"></tbody>
      </table>
    </div>
  </div>
</div>

</body>
</html>
